<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CertAuth — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="toast"></div>

<div class="page-wrapper">
  <div class="card">
    <div class="card-header">
      <div class="logo">CERT<span>AUTH</span></div>
      <p>Secure Certificate System</p>
    </div>

    <div class="field">
      <label>Username</label>
      <input id="username" type="text" placeholder="enter username" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="login()">Login</button>

    <div class="switch-text">
      No account? <a href="pages/register.html">Register here</a>
    </div>
  </div>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = 'index.html';

  function toast(msg, type = 'info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    setTimeout(() => el.className = '', 3000);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('loginBtn');

    if (!username || !password) return toast('Enter username and password', 'error');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Authenticating...';

    try {
      const res  = await fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.setItem('role',     data.role);
        localStorage.setItem('username', data.username);
        localStorage.setItem('token',    data.token);
        toast('Login successful', 'success');
        setTimeout(() => window.location.href = 'index.html', 500);
      } else {
        toast(data.message || 'Invalid credentials', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Login';
        document.getElementById('password').value = '';
      }
    } catch {
      toast('Cannot connect to server', 'error');
      btn.disabled = false;
      btn.innerHTML = 'Login';
    }
  }
</script>
</body>
</html>
